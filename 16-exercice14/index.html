<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <form method="POST" action="#">
            <div>
                <h1>Connexion</h1>
            </div>
            <div>
                <label for="pseudo">Pseudo:</label>
                <input type="text" id="pseudo" name="pseudo" placeholder="Mon pseudo" required>
            </div>
            <div>
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" placeholder="Mon mot de passe" required>
            </div>
            <div>
                <input type="checkbox" id="souvenir" name="souvenir" checked>
                <label for="souvenir">Se souvenir de moi</label>
            </div>
            <div>
                <button type="submit">Connexion</button>
                <button>Retour</button>
            </div>
        </form>
    </main>
</body>
</html>
