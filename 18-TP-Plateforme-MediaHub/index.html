<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard - MediaHub</title>
</head>
<body>
    <header>
        <h1>Dashboard - MediaHub</h1>
    </header>
    <main>
        <section>
            <h2>Cinéma</h2>
            <video controls disablepictureinpicture controlslist="nodownload noremoteplayback" poster="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1EERyOH5VisJi8TZ9evgMRZOLoMXmLZbpUA&s" src="https://www.w3schools.com/html/mov_bbb.mp4">
                Your browser does not support the video element.
            </video>
        </section>
        <section>
            <h2>Streaming</h2>
            <iframe src="https://www.youtube.com/embed/IEIsUm8kX6k?si=_iHwNn2I3Atqb8YZ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>
        <section>
            <h2>Podcast</h2>
            <figure>
                <figcaption>Le bruit d'un cheval</figcaption>
                <audio controls src="https://www.w3schools.com/html/horse.mp3">
                Your browser does not support the audio element.</audio>
            </figure>
        </section>
    </main>
</body>
</html>
