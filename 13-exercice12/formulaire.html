<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire</title>
    <style>
        textarea{
            display: block;
            resize: none;
        }
        form div{
            padding: 5px 0;
        }
        fieldset{
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #808080
        }
        input:not([type="file"]), textarea{
            border-radius: 5px;
            padding: 5px;
            border: 1px solid #808080
        }
        option::checkmark{
            content: "test"
        }
    </style>
</head>
<body>
    <form method="post" action="#">
        <fieldset>
            <legend>Infos personnelles</legend>
            <div>
                <label for="prenom">Prénom:</label>
                <input type="text" id="prenom" name="prenom" maxlength="20" minlength="2" placeholder="Ex: Jacques">
            </div>
            <div>
                <label for="nom">Nom:</label>
                <input type="text" id="nom" name="nom" maxlength="20" minlength="2" placeholder="Ex: Dubois">
            </div>
            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Ex: monMail@FAI.com">
            </div>
            <div>
                <label for="tel">Numéro:</label>
                <input type="tel" id="tel" name="numero" placeholder="Ex: 00.11.22.33.44">
            </div>
            <div>
                <label for="password">Mot de passe:</label>
                <input type="password" id="password" name="password" minlength="8" maxlength="30" placeholder="Ex: P@ssWo4d">
            </div>
            <div>
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" placeholder="Ex: 15">
            </div>
            <div>
                <label for="commentaire">Laisser un commentaire:</label>
                <textarea type="tel" id="commentaire" name="commentaire" placeholder="J'adore ce que vous faites !" cols="70" rows="10"></textarea>
            </div>
            <div>
                <label for="date">Date de mon commentaire:</label>
                <input type="date" id="date" name="date">
            </div>
            <div>
                <label for="photo">Ma photo</label>
                <input type="file" id="photo" name="photo" accept=".jpg, .png, .gif">
            </div>
        </fieldset>
        <fieldset>
            <legend>Vous préférez:</legend>
            <div>
                <input type="checkbox" id="html" name="langue" checked>
                <label for="html">Le HTML</label>
            </div>
            <div>
                <input type="checkbox" id="css" name="langue">
                <label for="css">Le CSS</label>
            </div>
            <div>
                <input type="checkbox" id="javascript" name="langue">
                <label for="javascript">Le JavaScript</label>
            </div>
            <div>
                <input type="checkbox" id="rien" name="langue">
                <label for="rien">Ne rien faire</label>
            </div>
        </fieldset>
        <fieldset>
            <legend>Vous vous levez:</legend>
            <div>
                <input type="radio" id="matin" name="reveil" checked>
                <label for="matin">Le matin</label>
            </div>
            <div>
                <input type="radio" id="midi" name="reveil">
                <label for="midi">Le midi</label>
            </div>
            <div>
                <input type="radio" id="soir" name="reveil">
                <label for="soir">Le soir</label>
            </div>
            <div>
                <input type="radio" id="retard" name="reveil">
                <label for="retard">En retard !</label>
            </div>
        </fieldset>
        <fieldset>
            <legend>Fin du formulaire</legend>
            <div>
            <label for="assez">Vous en avez assez ?</label>
                <select id="assez" name="assez">
                    <optgroup label="Team Pas encore">
                        <option value="plus">J'en veux plus</option>
                        <option value="super">C'est super !</option>
                    </optgroup>
                    <optgroup label="Team Oula">
                        <option value="marre">J'en ai marre</option>
                        <option value="pitie">Pitié !</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <button type="submit">Envoyer</button>
                <button type="reset">Reset</button>
            </div>
        </fieldset>
    </form>
</body>
</html>
